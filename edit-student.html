<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Edit Student</title>

  <link rel="stylesheet"
        href="css/style.css">

  <style>

    body {

      font-family: Arial, sans-serif;

      background: #f4f6f9;

      padding: 30px;
    }

    .container {

      max-width: 700px;

      margin: auto;

      background: white;

      padding: 30px;

      border-radius: 20px;

      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    h1 {

      margin-bottom: 20px;

      color: #1d3557;
    }

    input,
    select,
    button {

      width: 100%;

      padding: 14px;

      margin-top: 15px;

      border-radius: 10px;

      border: 1px solid #ccc;

      font-size: 16px;
    }

    button {

      background: #1d3557;

      color: white;

      border: none;

      cursor: pointer;
    }

    button:hover {

      background: #457b9d;
    }

    .back-btn {

      display: inline-block;

      margin-bottom: 20px;

      text-decoration: none;

      color: #1d3557;

      font-weight: bold;
    }

  </style>

</head>

<body>

  <div class="container">

    <a
      href="students.html"
      class="back-btn"
    >
      ← Back to Students
    </a>

    <h1>Edit Student</h1>

    <input
      type="text"
      id="full_name"
      placeholder="Full Name"
    >

    <input
      type="text"
      id="member_id"
      placeholder="Member ID"
    >

    <input
      type="text"
      id="phone"
      placeholder="Phone"
    >

    <input
      type="text"
      id="course"
      placeholder="Course"
    >

    <select id="status">

      <option value="active">
        Active
      </option>

      <option value="inactive">
        Inactive
      </option>

    </select>

    <button onclick="updateStudent()">
      Update Student
    </button>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="js/supabase.js"></script>

  <script src="js/auth.js"></script>

  <script src="js/edit-student.js"></script>

</body>

</html>
