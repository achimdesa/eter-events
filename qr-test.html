<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Eter Event QR</title>

  <style>

    body {

      font-family: Arial, sans-serif;

      text-align: center;

      padding: 30px;
    }

    #qr-wrapper {

      position: relative;

      width: 300px;

      margin: auto;
    }

    #qrCanvas {

      width: 300px;
      height: 300px;
    }

    #logo {

      position: absolute;

      top: 50%;
      left: 50%;

      transform: translate(-50%, -50%);

      width: 70px;
      height: 70px;

      border-radius: 50%;

      background: white;

      padding: 5px;
    }

  </style>
</head>

<body>

  <h2>Eter Event QR Verification</h2>

  <div id="qr-wrapper">

    <canvas id="qrCanvas"></canvas>

    <img
      id="logo"
      src="images/logo.png"
      alt="Logo"
    >

  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <script>

    const url =
      "http://127.0.0.1:5500/member.html?id=ETR-STU-0001";

    QRCode.toCanvas(

      document.getElementById('qrCanvas'),

      url,

      {
        width: 300,

        errorCorrectionLevel: 'H'
      },

      function (error) {

        if (error) {

          console.error(error);

        } else {

          console.log("QR Generated!");
        }
      }
    );

  </script>

</body>

</html>
