<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Admin Login</title>

  <link rel="stylesheet" href="css/style.css">

  <style>

    body {

      font-family: Arial, sans-serif;

      background: #f4f6f9;

      display: flex;

      justify-content: center;

      align-items: center;

      min-height: 100vh;
    }

    .login-box {

      background: white;

      padding: 40px;

      border-radius: 20px;

      width: 350px;

      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    input, button {

      width: 100%;

      padding: 12px;

      margin-top: 15px;

      border-radius: 10px;

      border: 1px solid #ccc;
    }

    button {

      background: #1d3557;

      color: white;

      border: none;

      cursor: pointer;
    }

  </style>

</head>

<body>

  <div class="login-box">

    <center>
    <img
        src="images/logo.png"
        alt="Logo"
        width="50"
        height="50"
        
      >
      </center>

    <h2>Admin Login</h2>

    <input
      type="email"
      id="email"
      placeholder="Enter Email"
    >

    <input
      type="password"
      id="password"
      placeholder="Enter Password"
    >

    <button onclick="loginAdmin()">
      Login
    </button>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="js/supabase.js"></script>

  <script src="js/auth.js"></script>

</body>

</html>
