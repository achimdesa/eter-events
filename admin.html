<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Admin QR Generator</title>

  <link rel="stylesheet" href="css/style.css">

  <style>

    body {

      font-family: Arial, sans-serif;

      background: #f4f6f9;

      padding: 30px;

      text-align: center;
    }

    .admin-container {

      max-width: 600px;

      margin: auto;

      background: white;

      padding: 30px;

      border-radius: 20px;

      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    select, button {

      padding: 12px;

      margin: 10px;

      width: 100%;

      border-radius: 10px;

      border: 1px solid #ccc;

      font-size: 16px;
    }

    #qr-wrapper {

      position: relative;

      width: 300px;

      margin: 30px auto;
    }

    #qrCanvas {

      width: 300px;
      height: 300px;
    }

    #logo {

      position: absolute;

      top: 50%;
      left: 50%;

      transform: translate(-50%, -50%);

      width: 70px;
      height: 70px;

      border-radius: 50%;

      background: white;

      padding: 5px;
    }

  </style>

</head>

<body>

  <div class="admin-container">

    <h1>Eter Event Admin</h1>

    <p>Generate Member QR Codes</p>

    <select id="memberSelect">

      <option value="">
        Select Member
      </option>

    </select>

    <button onclick="generateQRCode()">
      Generate QR Code
    </button>

    <div id="qr-wrapper">

      <canvas id="qrCanvas"></canvas>

      <img
        id="logo"
        src="images/logo.png"
        alt="Logo"
      >

    </div>

    <button id="downloadBtn"
            style="display:none;">
      Download QR
    </button>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="js/supabase.js"></script>

  <script src="js/admin.js"></script>

</body>

</html>
